<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookBook Perfil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fdf8f0; min-height: 100vh; }
.navbar { background: #fffdf9; border-bottom: 0.5px solid #e8dcc8; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon { width: 34px; height: 34px; background: #c17f24; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon i { font-size: 18px; color: #fff; }
.logo-name { font-size: 18px; font-weight: 500; color: #3d2b1f; }
.btn-sair { background: none; border: 0.5px solid #e24b4a; border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #e24b4a; cursor: pointer; }
.container { max-width: 800px; margin: 0 auto; padding: 2rem; }
.perfil-card { background: #fffdf9; border: 0.5px solid #e8dcc8; border-radius: 20px; padding: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
.avatar { width: 72px; height: 72px; background: #c17f24; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 500; color: #fff; flex-shrink: 0; }
.perfil-info h2 { font-size: 22px; font-weight: 500; color: #3d2b1f; margin-bottom: 4px; }
.perfil-info p { font-size: 14px; color: #8a7260; }
.section { background: #fffdf9; border: 0.5px solid #e8dcc8; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
.section-title { font-size: 16px; font-weight: 500; color: #3d2b1f; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.habilidade-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #f0e6d3; }
.habilidade-item:last-child { border-bottom: none; }
.hab-nome { font-size: 14px; color: #3d2b1f; }
.nivel-bar { display: flex; align-items: center; gap: 8px; }
.bar { height: 6px; width: 100px; background: #f0e6d3; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: #c17f24; border-radius: 3px; }
.nivel-num { font-size: 12px; color: #8a7260; min-width: 24px; text-align: right; }
.receita-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #f0e6d3; cursor: pointer; }
.receita-item:last-child { border-bottom: none; }
.receita-item:hover .rec-nome { color: #c17f24; }
.rec-nome { font-size: 14px; color: #3d2b1f; transition: color 0.2s; }
.rec-cats { font-size: 12px; color: #b09070; margin-top: 2px; }
.empty { text-align: center; padding: 1.5rem; color: #609070; font-size: 14px; }
.loading { text-align: center; padding: 2rem; color: #8a7260; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.btn-add { background: #c17f24; color: white; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
.btn-add:hover { background: #a96d1d; }
</style>
</head>
<body>
<nav class="navbar">
    <a class="logo" href="receitas.html">
        <div class="logo-icon"><i class="ti ti-bowl"></i></div>
        <span class="logo-name">CookBook</span>
    </a>
    <button class="btn-sair" onclick="sair()">
        <i class="ti ti-logout" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Sair
    </button>
</nav>
<div class="container">
    <div id="perfilConteudo"><div class="loading">Carregando perfil...</div></div>
</div>

<script>
const API = 'http://localhost:3000';
function getToken() { return localStorage.getItem('token'); }

function sair() { 
    localStorage.removeItem('token'); 
    localStorage.removeItem('aluno');
    window.location.href = 'index.html'; 
}

function adicionarHabilidade() {
    const nome = prompt('Digite o nome da habilidade:');
    if (!nome) return;

    const nivel = prompt('Digite o nível da habilidade (1-10):');
    if (!nivel) return;

    fetch(`${API}/habilidades`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
        },
        body: JSON.stringify({
            nome,
            nivel
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        carregarPerfil();
    })
    .catch(() => {
        alert('Erro ao adicionar habilidade');
    });
}

async function carregarPerfil() {
    if (!getToken()) { window.location.href = 'index.html'; return; }
    try {
        const res = await fetch(`${API}/alunos/perfil`, {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (!res.ok) { sair(); return; }
        
        const aluno = await res.json();
        const iniciais = aluno.nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
        
        document.getElementById('perfilConteudo').innerHTML = `
        <div class="perfil-card">
            <div class="avatar">${iniciais}</div>
            <div class="perfil-info">
                <h2>${aluno.nome}</h2>
                <p>${aluno.email}</p>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <p class="section-title">
                    <i class="ti ti-star"></i> Habilidades
                </p>

                <button class="btn-add" onclick="adicionarHabilidade()">
                    <i class="ti ti-plus"></i>
                    Adicionar
                </button>
            </div>
            ${aluno.habilidades && aluno.habilidades.length ? aluno.habilidades.map(h => `
            <div class="habilidade-item">
                <span class="hab-nome">${h.nome}</span>
                <div class="nivel-bar">
                    <div class="bar"><div class="bar-fill" style="width:${h.AlunoHabilidade.nivel * 10}%"></div></div>
                    <span class="nivel-num">${h.AlunoHabilidade.nivel}/10</span>
                </div>
            </div>`).join('') : '<div class="empty">Nenhuma habilidade cadastrada.</div>'}
        </div>
        
        <div class="section">
            <p class="section-title"><i class="ti ti-book"></i> Minhas Receitas</p>
            ${aluno.receitas && aluno.receitas.length ? aluno.receitas.map(r => `
            <div class="receita-item" onclick="window.location.href='receita.html?id=${r.id}'">
                <div>
                    <p class="rec-nome">${r.nome}</p>
                    <p class="rec-cats">${r.categorias && r.categorias.length ? r.categorias.map(c=>c.nome).join(', ') : 'Sem categoria'}</p>
                </div>
                <i class="ti ti-chevron-right" style="color: #609070;font-size:16px"></i>
            </div>`).join('') : '<div class="empty">Nenhuma receita criada ainda.</div>'}
        </div>`;
    } catch(e) {
        document.getElementById('perfilConteudo').innerHTML = '<p style="color: #e24b4a; padding: 1rem">Erro ao carregar perfil.</p>';
    }
}

carregarPerfil();
</script>
</body>
</html>
